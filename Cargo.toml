[workspace]
members = [
    "crates/httpgenerator-core",
    "crates/httpgenerator-openapi",
    "crates/httpgenerator-cli",
    "crates/httpgenerator-compat",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/christianhelle/httpgenerator"
version = "0.1.0"

[workspace.dependencies]
clap = { version = "4.5.53", features = ["derive"] }
httpgenerator-core = { path = "crates/httpgenerator-core" }
httpgenerator-openapi = { path = "crates/httpgenerator-openapi" }
openapiv3 = "2.2.0"
openapiv3_1 = "0.1.5"
regex = "1.12.2"
reqwest = { version = "0.12.24", default-features = false, features = ["blocking", "gzip", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.145", features = ["preserve_order"] }
url = "2.5.7"
yaml_serde = "0.10.4"

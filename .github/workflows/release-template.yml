name: Release Template

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      publish-crates:
        required: false
        type: boolean
        default: false
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

jobs:
  build-cli:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Rust CLI (Linux)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x64.tar.gz
            upload_name: rust-cli-linux-x64
          - name: Rust CLI (macOS x64)
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive_suffix: darwin-x64.tar.gz
            upload_name: rust-cli-darwin-x64
          - name: Rust CLI (macOS ARM64)
            os: macos-15
            target: aarch64-apple-darwin
            archive_suffix: darwin-arm64.tar.gz
            upload_name: rust-cli-darwin-arm64
          - name: Rust CLI (Windows)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_suffix: win-x64.zip
            upload_name: rust-cli-win-x64
    steps:
      - uses: actions/checkout@v6

      - name: Update Version
        shell: pwsh
        run: |
          # Update workspace version
          $rootToml = (Get-Content -Path Cargo.toml -Raw) -replace 'version = "0.1.0"', 'version = "${{ inputs.version }}"'
          $rootToml | Set-Content -Path Cargo.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust CLI
        run: cargo build --release --target ${{ matrix.target }} -p httpgenerator

      - name: Stage artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf "artifacts/httpgenerator-${{ inputs.version }}-${{ matrix.archive_suffix }}" -C "target/${{ matrix.target }}/release" httpgenerator

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $artifactPath = "artifacts\httpgenerator-$env:{ inputs.version }-${{ matrix.archive_suffix }}"
          Compress-Archive -Path "target\${{ matrix.target }}\release\httpgenerator.exe" -DestinationPath $artifactPath -Force

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.upload_name }}
          path: artifacts

  publish-crates:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    needs:
      - build-cli
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Version
        shell: pwsh
        run: |
          $toml = (Get-Content -Path Cargo.toml -Raw) -replace 'version = "0.1.0"', 'version = "${{ inputs.version }}"'
          $toml | Set-Content -Path Cargo.toml

      - name: Publish httpgenerator
        run: cargo publish --allow-dirty

  create-tag:
    name: Create tag
    needs:
      - publish-crates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >-
      ${{
        always() &&
        needs.build-cli.result == 'success' &&
        needs.build-vscode.result == 'success' &&
        needs.vsix.result == 'success' &&
        (needs.validate-publish.result == 'success' || needs.validate-publish.result == 'skipped') &&
        (needs.publish-crates.result == 'success' || needs.publish-crates.result == 'skipped')
      }}
    steps:
      - name: Create tag
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = `tags/${process.env.{ inputs.version }}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref });
              core.info(`Tag ${process.env.{ inputs.version }} already exists; skipping creation.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/${ref}`,
                sha: context.sha
              });
            }

  create-release:
    name: Create GitHub release
    needs:
      - create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >-
      ${{
        always() &&
        needs.build-cli.result == 'success' &&
        needs.build-vscode.result == 'success' &&
        needs.vsix.result == 'success' &&
        needs.create-tag.result == 'success' &&
        (needs.validate-publish.result == 'success' || needs.validate-publish.result == 'skipped') &&
        (needs.publish-crates.result == 'success' || needs.publish-crates.result == 'skipped')
      }}
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Ensure release assets were downloaded
        shell: bash
        run: |
          set -euo pipefail
          if ! find artifacts -type f -print -quit | grep -q .; then
            echo "::error::No release artifacts were downloaded."
            exit 1
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.{ inputs.version } }}
          name: Release v${{ env.{ inputs.version } }}
          generate_release_notes: true
          files: |
            artifacts/**/*
          draft: false
          prerelease: ${{ contains(env.{ inputs.version }, '-') }}

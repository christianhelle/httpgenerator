name: Release Template

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      publish-crates:
        required: false
        type: boolean
        default: false
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.validate.outputs.release-version }}
    steps:
      - name: Validate version format
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "::error::Invalid release version '$RELEASE_VERSION'."
            exit 1
          fi

          echo "release-version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

  cli-linux:
    name: Rust CLI (Linux)
    needs: validate-version
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Update Rust version
        run: python .github/scripts/set-rust-workspace-version.py --version "$RELEASE_VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/httpgenerator-${RELEASE_VERSION}-linux-x64.tar.gz" -C target/release httpgenerator

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Rust CLI Linux
          path: artifacts/*

  cli-macos:
    name: Rust CLI (macOS)
    needs: validate-version
    runs-on: macos-13
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Rust version
        run: python .github/scripts/set-rust-workspace-version.py --version "$RELEASE_VERSION"

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/httpgenerator-${RELEASE_VERSION}-darwin-x64.tar.gz" -C target/release httpgenerator

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Rust CLI macOS
          path: artifacts/*

  cli-windows:
    name: Rust CLI (Windows)
    needs: validate-version
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Update Rust version
        run: python .github\scripts\set-rust-workspace-version.py --version $env:RELEASE_VERSION
        shell: pwsh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator

      - name: Stage artifact
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $artifactPath = "artifacts\httpgenerator-$env:RELEASE_VERSION-win-x64.zip"
          Compress-Archive -Path target\release\httpgenerator.exe -DestinationPath $artifactPath -Force
        shell: pwsh

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Rust CLI Windows
          path: artifacts\*

  vscode-linux:
    name: VS Code Extension (Linux)
    needs: validate-version
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update versions
        run: |
          python .github/scripts/set-rust-workspace-version.py --version "$RELEASE_VERSION"
          node -e "const fs=require('fs'); const path='src/vscode/package.json'; const json=JSON.parse(fs.readFileSync(path, 'utf8')); json.version=process.env.RELEASE_VERSION; fs.writeFileSync(path, JSON.stringify(json, null, 2) + '\n');"

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator

      - name: Bundle Rust CLI
        run: |
          mkdir -p src/vscode/bin
          cp target/release/httpgenerator src/vscode/bin/httpgenerator

      - name: Install dependencies
        working-directory: src/vscode
        run: npm ci --ignore-scripts

      - name: Compile extension
        working-directory: src/vscode
        run: npm run compile

      - name: Package extension
        working-directory: src/vscode
        run: npx --no-install vsce package --target linux-x64

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VS Code Extension Linux
          path: src/vscode/*.vsix

  vscode-macos:
    name: VS Code Extension (macOS)
    needs: validate-version
    runs-on: macos-13
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update versions
        run: |
          python .github/scripts/set-rust-workspace-version.py --version "$RELEASE_VERSION"
          node -e "const fs=require('fs'); const path='src/vscode/package.json'; const json=JSON.parse(fs.readFileSync(path, 'utf8')); json.version=process.env.RELEASE_VERSION; fs.writeFileSync(path, JSON.stringify(json, null, 2) + '\n');"

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator

      - name: Bundle Rust CLI
        run: |
          mkdir -p src/vscode/bin
          cp target/release/httpgenerator src/vscode/bin/httpgenerator

      - name: Install dependencies
        working-directory: src/vscode
        run: npm ci --ignore-scripts

      - name: Compile extension
        working-directory: src/vscode
        run: npm run compile

      - name: Package extension
        working-directory: src/vscode
        run: npx --no-install vsce package --target darwin-x64

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VS Code Extension macOS
          path: src/vscode/*.vsix

  vscode-windows:
    name: VS Code Extension (Windows)
    needs: validate-version
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Update versions
        run: |
          python .github\scripts\set-rust-workspace-version.py --version $env:RELEASE_VERSION
          $path = 'src\vscode\package.json'
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.version = $env:RELEASE_VERSION
          $json | ConvertTo-Json -Depth 100 | Set-Content $path
        shell: pwsh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator

      - name: Bundle Rust CLI
        run: |
          New-Item -ItemType Directory -Path src\vscode\bin -Force | Out-Null
          Copy-Item target\release\httpgenerator.exe src\vscode\bin\httpgenerator.exe -Force
        shell: pwsh

      - name: Install dependencies
        working-directory: src/vscode
        run: npm ci --ignore-scripts

      - name: Compile extension
        working-directory: src/vscode
        run: npm run compile

      - name: Package extension
        working-directory: src/vscode
        run: npx --no-install vsce package --target win32-x64

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: VS Code Extension Windows
          path: src/vscode/*.vsix

  vsix:
    name: Visual Studio extension
    needs: validate-version
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Update versions
        run: |
          python .github\scripts\set-rust-workspace-version.py --version $env:RELEASE_VERSION
          ((Get-Content -Path src/dotnet/HttpGenerator.VSIX/source.extension.vsixmanifest -Raw) -Replace '1.0.0', $env:RELEASE_VERSION) | Set-Content -Path src/dotnet/HttpGenerator.VSIX/source.extension.vsixmanifest
        shell: pwsh

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator

      - name: Bundle Rust CLI
        run: Copy-Item target\release\httpgenerator.exe src/dotnet/HttpGenerator.VSIX/httpgenerator.exe -Force
        shell: pwsh

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild src/dotnet/VSIX.slnx -t:Restore

      - name: Build
        run: msbuild src/dotnet/VSIX.slnx /property:Configuration=Release /p:DeployExtension=false

      - name: Move build output
        run: Move-Item src/dotnet/HttpGenerator.VSIX/bin\Release\HttpGenerator.VSIX.vsix ("HttpGenerator-" + $env:RELEASE_VERSION + ".vsix")
        shell: pwsh

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Visual Studio Extension
          path: |
            *.vsix
            docs/Marketplace*.md

  validate-publish:
    name: Validate crate publishing
    if: ${{ inputs.publish-crates }}
    needs:
      - validate-version
      - cli-linux
      - cli-macos
      - cli-windows
      - vscode-linux
      - vscode-macos
      - vscode-windows
      - vsix
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Ensure crates.io token is configured
        shell: bash
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is required when publish-crates is enabled."
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Rust version
        run: python .github/scripts/set-rust-workspace-version.py --version "$RELEASE_VERSION"

      - name: Fail if release version already exists on crates.io
        shell: bash
        run: |
          python .github/scripts/check-crates-io-version.py --crate httpgenerator-core --version "$RELEASE_VERSION" --state absent
          python .github/scripts/check-crates-io-version.py --crate httpgenerator --version "$RELEASE_VERSION" --state absent

      - name: Run package validation and dry run - publish core
        run: |
          # Validate dependent package locally for manifest issues
          cargo package --allow-dirty -p httpgenerator
          cargo publish --dry-run --allow-dirty -p httpgenerator-core

  publish-crates:
    name: Publish crates.io packages
    if: ${{ inputs.publish-crates }}
    needs:
      - validate-version
      - validate-publish
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Rust version
        run: python .github/scripts/set-rust-workspace-version.py --version "$RELEASE_VERSION"

      - name: Publish httpgenerator-core
        run: cargo publish --allow-dirty -p httpgenerator-core

      - name: Wait for httpgenerator-core on crates.io
        shell: bash
        run: python .github/scripts/check-crates-io-version.py --crate httpgenerator-core --version "$RELEASE_VERSION" --state present --retries 60 --delay-seconds 10

      - name: Dry run - publish httpgenerator
        run: cargo publish --dry-run --allow-dirty -p httpgenerator

      - name: Publish httpgenerator
        run: cargo publish --allow-dirty -p httpgenerator

  create-tag:
    name: Create tag
    needs:
      - validate-version
      - cli-linux
      - cli-macos
      - cli-windows
      - vscode-linux
      - vscode-macos
      - vscode-windows
      - vsix
      - validate-publish
      - publish-crates
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.validate-version.outputs.release-version }}
    if: >-
      ${{
        always() &&
        needs.validate-version.result == 'success' &&
        needs.cli-linux.result == 'success' &&
        needs.cli-macos.result == 'success' &&
        needs.cli-windows.result == 'success' &&
        needs.vscode-linux.result == 'success' &&
        needs.vscode-macos.result == 'success' &&
        needs.vscode-windows.result == 'success' &&
        needs.vsix.result == 'success' &&
        (needs.validate-publish.result == 'success' || needs.validate-publish.result == 'skipped') &&
        (needs.publish-crates.result == 'success' || needs.publish-crates.result == 'skipped')
      }}
    steps:
      - name: Create tag
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${process.env.RELEASE_VERSION}`,
              sha: context.sha
            })

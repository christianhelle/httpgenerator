name: Run Tests

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      production:
        required: false
        type: bool
        default: true

jobs:
  
  test:

    name: ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: 10

    steps:
    - name: 🛒 Checkout repository
      uses: actions/checkout@v6

    - name: 🦀 Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: 📦 Cache Cargo
      uses: Swatinem/rust-cache@v3

    - name: 🛠️ Run Smoke Test (Production) 
      run: ./smoke-tests.ps1 -Production
      working-directory: test
      shell: pwsh
      if: ${{ inputs.production }}


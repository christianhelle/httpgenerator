name: Run Tests (URL)

on:
  workflow_call:
    inputs:
      openapi:
        required: true
        type: string
      os:
        type: string
        default: ubuntu-latest
      command:
        required: true
        type: string

jobs:
  
  test:

    name: ${{ inputs.openapi }} (${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    timeout-minutes: 10

    steps:
    - name: 🛒 Checkout repository
      uses: actions/checkout@v6
      
    - name: 🦀 Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: 📦 Cache Cargo
      uses: Swatinem/rust-cache@v3
    - name: 🛠️ Build
      run: cargo build --release --locked

    - name: 🛠️ Generate code
      run: ${{ inputs.command }} "${{ inputs.openapi }}" --no-logging
      working-directory: test
      shell: pwsh

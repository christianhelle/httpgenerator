name: Run Tests (URL)

on:
  workflow_call:
    inputs:
      openapi:
        required: true
        type: string
      os:
        type: string
        default: ubuntu-latest
      command:
        required: true
        type: string

jobs:
  test:
    name: ${{ inputs.openapi }} ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: 10
    env:
      OPENAPI_SOURCE: ${{ inputs.openapi }}
      GENERATOR_COMMAND: ${{ inputs.command }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI
        run: cargo build --locked --release -p httpgenerator-cli

      - name: Generate code
        run: '& $env:GENERATOR_COMMAND $env:OPENAPI_SOURCE --no-logging'
        working-directory: test
        shell: pwsh

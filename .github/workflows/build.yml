name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    paths:
      - ".github/workflows/build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/rust/**"
      - "src/dotnet/**"
      - "src/vscode/**"
      - "test/**"
  pull_request:
    branches:
      - "*"
    paths:
      - ".github/workflows/build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/rust/**"
      - "src/dotnet/**"
      - "src/vscode/**"
      - "test/**"

env:
  VERSION: 1.1.0.${{ github.run_number }}

jobs:
  cli:
    name: Rust CLI and .NET solution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Run Rust tests
        run: cargo test --locked

      - name: Build .NET solution
        run: dotnet build -c Release src/dotnet/HttpGenerator.slnx -p:UseSourceLink=true -p:PackageVersion="${{ env.VERSION }}" -p:Version="${{ env.VERSION }}"

      - name: Test .NET solution
        run: dotnet test src/dotnet/HttpGenerator.slnx -c Release

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: src/vscode
        run: npm ci --ignore-scripts

      - name: Compile extension
        working-directory: src/vscode
        run: npm run compile

  vsix:
    name: VSIX solution
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild src/dotnet/VSIX.slnx -t:Restore

      - name: Build
        run: msbuild src/dotnet/VSIX.slnx /property:Configuration=Release /p:DeployExtension=false


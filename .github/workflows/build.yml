name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    paths:
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-template.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/rust/**"
      - "src/dotnet/**"
      - "src/vscode/**"
      - "test/**"
  pull_request:
    branches:
      - "*"
    paths:
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-template.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/rust/**"
      - "src/dotnet/**"
      - "src/vscode/**"
      - "test/**"

env:
  VERSION: 1.1.0.${{ github.run_number }}

jobs:
  cli:
    name: Rust CLI and .NET solution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Run Rust tests
        run: cargo test --locked --workspace

      - name: Build .NET solution
        run: dotnet build -c Release src/dotnet/HttpGenerator.slnx -p:UseSourceLink=true -p:PackageVersion="${{ env.VERSION }}" -p:Version="${{ env.VERSION }}"

      - name: Test .NET solution
        run: dotnet test src/dotnet/HttpGenerator.slnx -c Release

  vscode:
    name: VS Code extension (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
          - os: macos-15-intel
            target: darwin-x64
          - os: macos-14
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Package extension
        if: runner.os != 'Windows'
        working-directory: src/vscode
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh "${{ env.VERSION }}" "${{ matrix.target }}"

      - name: Package extension
        if: runner.os == 'Windows'
        working-directory: src/vscode
        shell: pwsh
        run: |
          .\build.ps1 -Version $env:VERSION -Target '${{ matrix.target }}'

  publish-readiness:
    name: crates.io publish readiness
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: 0.0.0-ci.${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Inject workspace release version
        shell: pwsh
        run: |
          $path = 'Cargo.toml'
          $content = Get-Content -Path $path -Raw
          $workspacePattern = '(?m)^version = "0\.1\.0"$'
          $dependencyPattern = 'httpgenerator-core = \{ version = "0\.1\.0", path = "src/rust/core" \}'
          $workspaceMatches = [regex]::Matches($content, $workspacePattern).Count
          $dependencyMatches = [regex]::Matches($content, $dependencyPattern).Count
          if ($workspaceMatches -ne 1 -or $dependencyMatches -ne 1) {
            throw "Expected one workspace version anchor and one httpgenerator-core dependency anchor in $path."
          }
          $content = $content -replace $workspacePattern, ('version = "' + $env:RELEASE_VERSION + '"')
          $content = $content -replace $dependencyPattern, ('httpgenerator-core = { version = "' + $env:RELEASE_VERSION + '", path = "src/rust/core" }')
          Set-Content -Path $path -Value $content

      - name: "Dry run: publish core"
        run: cargo publish --dry-run --allow-dirty -p httpgenerator-core

      - name: Build downstream packages with injected version
        run: cargo check -p httpgenerator

  vsix:
    name: VSIX solution
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild src/dotnet/VSIX.slnx -t:Restore

      - name: Build
        run: msbuild src/dotnet/VSIX.slnx /property:Configuration=Release /p:DeployExtension=false

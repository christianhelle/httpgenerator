name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    paths:
      - ".github/workflows/build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "src/**/*.cs"
      - "src/**/*.csproj"
      - "src/HttpGenerator.VSIX/**"
      - "src/VSCode/**"
      - "test/**"
  pull_request:
    branches:
      - "*"
    paths:
      - ".github/workflows/build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "src/**/*.cs"
      - "src/**/*.csproj"
      - "src/HttpGenerator.VSIX/**"
      - "src/VSCode/**"
      - "test/**"

env:
  VERSION: 1.1.0.${{ github.run_number }}

jobs:
  cli:
    name: Rust CLI and legacy solution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Run Rust tests
        run: cargo test

      - name: Build legacy solution
        run: dotnet build -c Release HttpGenerator.sln -p:UseSourceLink=true -p:PackageVersion="${{ env.VERSION }}" -p:Version="${{ env.VERSION }}"

      - name: Test legacy solution
        run: dotnet test HttpGenerator.sln -c Release

  vscode:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: src/VSCode
        run: npm ci

      - name: Compile extension
        working-directory: src/VSCode
        run: npm run compile

  vsix:
    name: VSIX solution
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild src\VSIX.sln -t:Restore

      - name: Build
        run: msbuild src\VSIX.sln /property:Configuration=Release /p:DeployExtension=false

name: VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "legacy/**"
      - ".github/workflows/vsix.yml"
  pull_request:
    branches:
      - "*"
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "legacy/**"
      - ".github/workflows/vsix.yml"

env:
  VERSION: 1.0.${{ github.run_number }}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update versions
        run: |
          ((Get-Content -Path Cargo.toml -Raw) -Replace 'version = "0\.1\.0"', 'version = "${{ env.VERSION }}"') | Set-Content -Path Cargo.toml
          ((Get-Content -Path legacy\HttpGenerator.VSIX\source.extension.vsixmanifest -Raw) -Replace '1.0.0', '${{ env.VERSION }}') | Set-Content -Path legacy\HttpGenerator.VSIX\source.extension.vsixmanifest
        shell: pwsh

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator-cli

      - name: Bundle Rust CLI
        run: Copy-Item target\release\httpgenerator.exe legacy\HttpGenerator.VSIX\httpgenerator.exe -Force
        shell: pwsh

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild legacy\VSIX.sln -t:Restore

      - name: Build
        run: msbuild legacy\VSIX.sln /property:Configuration=Release /p:DeployExtension=false

      - name: Move build output
        run: Move-Item legacy\HttpGenerator.VSIX\bin\Release\HttpGenerator.VSIX.vsix HttpGenerator-${{ env.VERSION }}.vsix
        shell: pwsh

      - name: Publish artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: |
            *.vsix

      - name: Publish to Open VSIX Gallery
        if: github.ref == 'refs/heads/main'
        run: |
          (new-object Net.WebClient).DownloadString("https://raw.github.com/madskristensen/ExtensionScripts/master/AppVeyor/vsix.ps1") | iex
          Vsix-PushArtifacts
          Vsix-PublishToGallery -path HttpGenerator-${{ env.VERSION }}.vsix -readmeUrl https://raw.githubusercontent.com/christianhelle/HttpGenerator/master/docs/Marketplace.md
        shell: pwsh
        continue-on-error: true

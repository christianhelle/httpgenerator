name: VS Code

on:
  push:
    paths:
      - ".github/workflows/vscode.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/rust/**"
      - "src/vscode/**"
  pull_request:
    paths:
      - ".github/workflows/vscode.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/rust/**"
      - "src/vscode/**"
  workflow_dispatch:

env:
  VERSION: 1.1.${{ github.run_number }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            shell: bash
          - os: windows-latest
            target: win32-x64
            msvc_arch: amd64
            shell: pwsh
          - os: windows-latest
            target: win32-arm64
            msvc_arch: amd64_arm64
            shell: pwsh
          - os: macos-13
            target: darwin-x64
            shell: bash
          - os: macos-14
            target: darwin-arm64
            shell: bash
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Version
        working-directory: src/vscode
        run: |
          node -e "const fs=require('fs'); const path='package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=process.env.VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Build and package extension
        if: runner.os != 'Windows'
        working-directory: src/vscode
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh "${VERSION}" "${{ matrix.target }}"

      - name: Build and package extension
        if: runner.os == 'Windows'
        working-directory: src/vscode
        shell: pwsh
        run: |
          .\build.ps1 -Version $env:VERSION -Target '${{ matrix.target }}'

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-${{ matrix.target }}
          path: src/vscode/*.vsix

name: VS Code

on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "src/VSCode/**"
      - ".github/workflows/vscode.yml"
  workflow_dispatch:

env:
  VERSION: 1.0.${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update versions
        run: |
          sed -i 's/^version = "0\.1\.0"$/version = "${{ env.VERSION }}"/' Cargo.toml
          node -e "const fs=require('fs'); const path='src/VSCode/package.json'; const json=JSON.parse(fs.readFileSync(path, 'utf8')); json.version='${{ env.VERSION }}'; fs.writeFileSync(path, JSON.stringify(json, null, 2) + '\n');"

      - name: Build Rust CLI
        run: cargo build --release -p httpgenerator-cli

      - name: Bundle Rust CLI
        run: |
          mkdir -p src/VSCode/bin
          cp target/release/httpgenerator src/VSCode/bin/httpgenerator

      - name: Install dependencies
        working-directory: src/VSCode
        run: npm ci

      - name: Compile extension
        working-directory: src/VSCode
        run: npm run compile

      - name: Package extension
        working-directory: src/VSCode
        run: |
          npm install -g @vscode/vsce
          vsce package --target linux-x64

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v7
        with:
          name: VSCode Extension
          path: src/VSCode/*.vsix
